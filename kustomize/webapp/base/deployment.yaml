apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
spec:
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
      - name: service
        image: us-west1-docker.pkg.dev/digital-ucdavis-edu/jm-dev/webapp:sandbox
        imagePullPolicy: Always
        resources:
          requests:
            memory: "200Mi"
            cpu: "200m"
        envFrom:
          - configMapRef:
              name: app-config
          - secretRef:
              name: jwt-secret
          - secretRef:
              name: oidc-client-secret
        volumeMounts:
        - name: service-account
          mountPath: /etc/aggie-experts/service-account.json
          subPath: service-account.json
      volumes:
        - name: service-account
          secret:
            secretName: service-account