services:
  anduin-gateway:
    image: us-west1-docker.pkg.dev/aggie-experts/pub/anduin-gateway:5.0.0-rc.9
    restart: always
    env_file:
      - .env
    depends_on:
      - postgres
    environment:
      PORT: '4000'
      APP_NAME: Aggie Experts - Harvest
      POSTGRES_PASSWORD: postgres
      CASK_URL: http://caskfs-ui:3000
      DAGSTER_URL: http://dagster-ui:3000
      DEFAULT_DASHBOARD_LINK: /superset/superset/dashboard/1
    ports:
      - '4000:4000'
  dagster-ui:
    image: us-west1-docker.pkg.dev/aggie-experts/pub/harvest:5.0.0-rc.9
    env_file:
      - .env
    environment:
      DAGSTER_POSTGRES_USER: postgres
      DAGSTER_POSTGRES_PASSWORD: postgres
      DAGSTER_POSTGRES_DB: dagster
      DAGSTER_CURRENT_IMAGE: us-west1-docker.pkg.dev/aggie-experts/pub/harvest:5.0.0-rc.9
    volumes:
      - dagster_storage:/opt/dagster/dagster_home/storage
    depends_on:
      - postgres
    command:
      - dagster-webserver
      - '--path-prefix'
      - /dagster
      - '-h'
      - 0.0.0.0
      - '-p'
      - '3000'
      - '-w'
      - /opt/dagster/dagster_home/workspace.yaml
  dagster-daemon:
    image: us-west1-docker.pkg.dev/aggie-experts/pub/harvest:5.0.0-rc.9
    env_file:
      - .env
    environment:
      EXPERTS_CACHE_ROOT_DIR: /opt/cache
      GOOGLE_APPLICATION_CREDENTIALS: /service-account.json
      DAGSTER_POSTGRES_USER: postgres
      DAGSTER_POSTGRES_PASSWORD: postgres
      DAGSTER_POSTGRES_DB: dagster
      DAGSTER_CURRENT_IMAGE: us-west1-docker.pkg.dev/aggie-experts/pub/harvest:5.0.0-rc.9
    volumes:
      - ./service-account.json:/service-account.json:ro
      - dagster_storage:/opt/dagster/dagster_home/storage
      - data_cache:/opt/cache
    depends_on:
      - postgres
    command:
      - dagster-daemon
      - run
      - '-w'
      - /opt/dagster/dagster_home/workspace.yaml
  dagster-celery-worker:
    image: us-west1-docker.pkg.dev/aggie-experts/pub/harvest:5.0.0-rc.9
    env_file:
      - .env
    environment:
      EXPERTS_CACHE_ROOT_DIR: /opt/cache
      DAGSTER_POSTGRES_USER: postgres
      DAGSTER_POSTGRES_PASSWORD: postgres
      DAGSTER_POSTGRES_DB: dagster
      DAGSTER_CURRENT_IMAGE: us-west1-docker.pkg.dev/aggie-experts/pub/harvest:5.0.0-rc.9
      CASKFS_LOG_LEVEL: warn
      GOOGLE_APPLICATION_CREDENTIALS: /service-account.json
    volumes:
      - ./service-account.json:/service-account.json:ro
      - dagster_storage:/opt/dagster/dagster_home/storage
      - data_cache:/opt/cache
    depends_on:
      rabbitmq:
        condition: service_started
      postgres:
        condition: service_healthy
    command:
      - dagster-celery
      - worker
      - start
      - '-A'
      - dagster_celery.app
      - '-y'
      - /opt/dagster/dagster_home/celery_config.yaml
  rabbitmq:
    image: rabbitmq:3-management
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
  caskfs-ui:
    image: us-west1-docker.pkg.dev/aggie-experts/pub/harvest:5.0.0-rc.9
    env_file:
      - .env
    environment:
      EXPERTS_CACHE_ROOT_DIR: /opt/cache
      CASKFS_PG_HOST: postgres
      CASKFS_ENABLE_POWERWASH: 'true'
      CASKFS_ROOT_DIR: /opt/cache
      CASKFS_ACL_ENABLED: 'false'
      CASKFS_WEBAPP_PATH_PREFIX: /cask
    volumes:
      - data_cache:/opt/cache
    depends_on:
      - postgres
    command:
      - cask
      - serve
  postgres:
    image: us-west1-docker.pkg.dev/aggie-experts/pub/ae-postgres:5.0.0-rc.9
    shm_size: 1g
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
  superset:
    image: us-west1-docker.pkg.dev/digital-ucdavis-edu/pub/superset:0.1.2
    env_file:
      - .env
    environment:
      DASHBOARD_FILE: gs://anduin-dashboards/dashboard_prod.zip
      GOOGLE_APPLICATION_CREDENTIALS: /service-account.json
      SUPERSET_APP_ROOT: /superset
    depends_on:
      - postgres
    volumes:
      - ./service-account.json:/service-account.json:ro
      - superset_home:/app/superset_home
      - superset_init:/etc/superset/init
  elasticsearch:
    image: us-west1-docker.pkg.dev/aggie-experts/pub/elastic-search:5.0.0-rc.9
    environment:
      node.name: elasticsearch
      bootstrap.memory_lock: 'true'
      ES_JAVA_OPTS: '-Xms4g -Xmx4g'
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data:/usr/share/elasticsearch/data
    restart: unless-stopped
  webapp-gateway:
    image: us-west1-docker.pkg.dev/aggie-experts/pub/webapp:5.0.0-rc.9
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /service-account.json
    env_file:
      - .env
    volumes:
      - ./service-account.json:/service-account.json:ro
    ports:
      - '8080:3000'
    depends_on:
      elasticsearch:
        condition: service_started
    restart: unless-stopped
    command: npm run gateway
  spa:
    image: us-west1-docker.pkg.dev/aggie-experts/pub/webapp:5.0.0-rc.9
    environment:
      CLIENT_ENV: prod
      EXPERTS_IS_PUBLIC: ${EXPERTS_IS_PUBLIC:-true}
    depends_on:
      elasticsearch:
        condition: service_started
    restart: unless-stopped
    command: npm run spa
  api:
    image: us-west1-docker.pkg.dev/aggie-experts/pub/webapp:5.0.0-rc.9
    env_file:
      - .env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /service-account.json
      CDL_PROPAGATE_CHANGES: true
      CDL_PROPAGATE_CHANGES_INSTANCE: qa
    volumes:
      - ./service-account.json:/service-account.json:ro
    depends_on:
      elasticsearch:
        condition: service_started
    restart: unless-stopped
    command: npm run api
  kibana:
    image: docker.elastic.co/kibana/kibana:8.4.3
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SERVER_BASEPATH: /kibana
      SERVER_REWRITEBASEPATH: 'true'
      SERVER_PUBLICBASEURL: http://localhost:4000/kibana
      xpack.security.enabled: 'false'
      telemetry.enabled: 'false'
    depends_on:
      - elasticsearch
volumes:
  data_cache:
    driver: local
  dagster_storage:
    driver: local
  superset_home:
    driver: local
  superset_init:
    driver: local
  es-data:
    driver: local
  rabbitmq_data:
    driver: local
  postgres_data:
    driver: local
